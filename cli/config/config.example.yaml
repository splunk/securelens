# Example SecureLens Configuration

# Git provider credentials - supports multiple instances of each provider
git:
  # GitLab instances
  gitlab:
    - name: gitlab-com
      token: ${GITLAB_TOKEN}
      api_url: https://gitlab.com/api/v4
  
  # GitHub instances
  github:
    - name: github-com
      token: ${GITHUB_TOKEN}
      api_url: https://api.github.com
      organizations: []  # empty = all accessible repos
    
    # Uncomment for GitHub Enterprise
    # - name: github-enterprise
    #   token: ${GITHUB_ENTERPRISE_TOKEN}
    #   api_url: https://github.company.com/api/v3
    #   organizations: ["engineering", "security"]

  # Bitbucket instances
  bitbucket:
    - name: bitbucket-cloud
      username: ${BITBUCKET_USERNAME}
      app_password: ${BITBUCKET_APP_PASSWORD}
      api_url: https://api.bitbucket.org/2.0
      workspace: myworkspace
    
    # Bitbucket server
    # - name: bitbucket-server
    #   username: ${BITBUCKET_SERVER_USERNAME}
    #   app_password: ${BITBUCKET_SERVER_PASSWORD}
    #   api_url: https://bitbucket.company.com

splunk:
  enabled: false
  hec_endpoint: "https://splunk.example.com:8088/services/collector"
  hec_token: ${SPLUNK_HEC_TOKEN}

slack:
  enabled: false
  bot_token: ${SLACK_BOT_TOKEN}
  channel: C1234567890
  # Optional overrides for the message identity (requires chat:write.customize)
  # username: SecureLens
  # icon_emoji: ":lock:"